# Topología base — sin valores de entorno ni puertos específicos.
# Siempre se usa combinado con un archivo de entorno:
#
#   Demo:       docker compose --env-file .env.demo -f docker-compose.yml -f docker-compose.demo.yml up --build
#   Producción: docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up --build
#
# Para dev local sin Docker, ver apps/api/.env y apps/api/.env.local (CLAUDE.md §8).

services:
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: fueltrack-web
    networks:
      - fueltrack-net

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: fueltrack-api
    env_file:
      - ./apps/api/.env.docker
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fueltrack-net

  db:
    image: postgres:15-alpine
    container_name: fueltrack-db
    env_file:
      - ./apps/api/.env.docker
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-fueltrack}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - fueltrack-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-fueltrack}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db-data:

networks:
  fueltrack-net:
    driver: bridge
