type TankCalibrationEntry {
  id: UUID!
  tankModelId: UUID!
  heightCm: Decimal!
  volumeLiters: Decimal!
  createdAt: DateTime!
  updatedAt: DateTime!
  # Relación
  tankModel: TankModel!
}

input CreateTankCalibrationEntryInput {
  tankModelId: UUID!
  heightCm: Decimal!
  volumeLiters: Decimal!
}

input UpdateTankCalibrationEntryInput {
  tankModelId: UUID
  heightCm: Decimal
  volumeLiters: Decimal
}

input CalibrationRowInput {
  heightCm: Decimal!
  volumeLiters: Decimal!
}

extend type Query {
  tankCalibrationEntries: [TankCalibrationEntry!]!
  tankCalibrationEntry(id: UUID!): TankCalibrationEntry
  tankCalibrationEntriesByModel(tankModelId: UUID!): [TankCalibrationEntry!]!
  tankCalibrationEntryByModelAndHeight(
    tankModelId: UUID!
    heightCm: Decimal!
  ): TankCalibrationEntry
}

extend type Mutation {
  createTankCalibrationEntry(
    input: CreateTankCalibrationEntryInput!
  ): TankCalibrationEntry!
  # Importación masiva desde CSV — reemplaza todas las entradas existentes del modelo
  bulkCreateTankCalibrationEntries(
    tankModelId: UUID!
    entries: [CalibrationRowInput!]!
  ): [TankCalibrationEntry!]!
  updateTankCalibrationEntry(
    id: UUID!
    input: UpdateTankCalibrationEntryInput!
  ): TankCalibrationEntry
  deleteTankCalibrationEntry(id: UUID!): Boolean!
}
