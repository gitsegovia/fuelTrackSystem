enum FuelKind {
  GASOLINE_91
  GASOLINE_95
  DIESEL
  KEROSENE
}

enum InvoiceStatus {
  PENDING
  CLOSED
}

type Invoice {
  id: UUID!
  invoiceNumber: String!
  controlNumber: String!
  sealNumber: String!
  liters: Decimal!
  dispatchDate: DateTime!
  dischargeDate: DateTime!
  truckIdentifier: String!
  fuelKind: FuelKind!
  totalAmount: Decimal!
  costPerLiter: Decimal!
  status: InvoiceStatus!
  createdAt: DateTime!
  updatedAt: DateTime!
  # Relaciones
  receivingGasStation: GasStation!
  currency: Currency!
  dispatchReceptions: [DispatchReception!]
}

input CreateInvoiceInput {
  invoiceNumber: String!
  controlNumber: String!
  sealNumber: String!
  liters: Decimal!
  dispatchDate: DateTime!
  dischargeDate: DateTime!
  truckIdentifier: String!
  fuelKind: FuelKind!
  totalAmount: Decimal!
  costPerLiter: Decimal!
  gasStationId: UUID!
  currencyId: UUID!
}

input UpdateInvoiceInput {
  invoiceNumber: String
  controlNumber: String
  sealNumber: String
  liters: Decimal
  dispatchDate: DateTime
  dischargeDate: DateTime
  truckIdentifier: String
  fuelKind: FuelKind
  totalAmount: Decimal
  costPerLiter: Decimal
  gasStationId: UUID
  currencyId: UUID
}

extend type Query {
  invoices: [Invoice!]!
  invoice(id: UUID!): Invoice
}

extend type Mutation {
  createInvoice(input: CreateInvoiceInput!): Invoice!
  updateInvoice(id: UUID!, input: UpdateInvoiceInput!): Invoice
  deleteInvoice(id: UUID!): Boolean!
  closeInvoice(id: UUID!): Invoice!
}
