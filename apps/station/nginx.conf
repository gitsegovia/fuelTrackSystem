server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # React Router — todas las rutas sirven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets con hash en el nombre: cache agresivo de 1 año
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Service Worker nunca se cachea (debe estar siempre actualizado)
    location /sw.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
